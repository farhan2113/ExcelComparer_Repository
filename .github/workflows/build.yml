name: Build KivyMD App for Multi-Platform

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller kivy kivymd pillow openpyxl pandas

        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

        # تثبيت الاعتماديات الخاصة بـ Linux
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt-get update
          sudo apt-get install -y \
            libmtdev1 libgl1 libglib2.0-0 \
            libsdl2-2.0-0 libsdl2-image-2.0-0 libsdl2-mixer-2.0-0 libsdl2-ttf-2.0-0 \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 \
            xvfb libegl1-mesa
        fi
      shell: bash

    # -------------------------------------------------------------
    # 1️⃣ بناء نسخة Windows (.exe)
    # -------------------------------------------------------------
    - name: Build Windows Executable
      if: matrix.target == 'windows'
      run: |
        mkdir -p assets
        pyinstaller --noconfirm --onedir --windowed --noupx \
          --icon="assets/ExcelComparerIcon.ico" \
          --name="ExcelComparer" \
          --collect-data kivymd --collect-data kivy \
          --add-data "kv_file.kv;." \
          --add-data "assets;assets" \
          app.py
        powershell Compress-Archive -Path dist/ExcelComparer -DestinationPath ExcelComparer-Windows.zip -Force
      shell: bash

    - name: Upload Windows Build
      if: matrix.target == 'windows'
      uses: actions/upload-artifact@v4
      with:
        name: Windows-EXE
        path: ExcelComparer-Windows.zip

    # -------------------------------------------------------------
    # 2️⃣ بناء نسخة macOS (.app)
    # -------------------------------------------------------------
    - name: Build macOS App
      if: matrix.target == 'macos'
      run: |
        mkdir -p assets
        pyinstaller --noconfirm --windowed \
          --icon="assets/ExcelComparerIcon.icns" \
          --name="ExcelComparer" \
          --collect-data kivymd --collect-data kivy \
          --add-data "kv_file.kv:." \
          --add-data "assets:assets" \
          app.py
        cd dist
        zip -r ExcelComparer-macOS.zip ExcelComparer.app

    - name: Upload macOS Build
      if: matrix.target == 'macos'
      uses: actions/upload-artifact@v4
      with:
        name: macOS-APP
        path: dist/ExcelComparer-macOS.zip

    # -------------------------------------------------------------
    # 3️⃣ بناء حزمة Linux (.deb)
    # -------------------------------------------------------------
    - name: Build Linux .deb Package
      if: matrix.target == 'linux'
      run: |
        mkdir -p assets
        
        # 1. بناء الملف التنفيذي
        pyinstaller --noconfirm --onedir \
          --name="ExcelComparer" \
          --collect-data kivymd --collect-data kivy \
          --add-data "kv_file.kv:." \
          --add-data "assets:assets" \
          app.py
        
        # 2. إنشاء هيكل الحزمة القياسي لـ Debian
        mkdir -p deb_pkg/DEBIAN
        mkdir -p deb_pkg/usr/bin
        mkdir -p deb_pkg/usr/share/excel_comparer
        mkdir -p deb_pkg/usr/share/pixmaps
        mkdir -p deb_pkg/usr/share/applications
        
        # 3. نقل مخرجات PyInstaller
        cp -r dist/ExcelComparer/* deb_pkg/usr/share/excel_comparer/
        
        # 4. نقل الشعار لقائمة البرامج (إن وجد داخل assets/ExcelComparerIcon.png)
        if [ -f assets/ExcelComparerIcon.png ]; then
          cp assets/ExcelComparerIcon.png deb_pkg/usr/share/pixmaps/excel_comparer.png
        fi

        # 5. إنشاء السكربت المساعد (مع الدخول لمجلد البرنامج تلقائياً)
        cat << 'EOF' > deb_pkg/usr/bin/excel_comparer
        #!/bin/sh
        cd /usr/share/excel_comparer
        exec ./ExcelComparer "$@"
        EOF
        chmod +x deb_pkg/usr/bin/excel_comparer

        # 6. إنشاء اختصار القائمة (.desktop)
        cat << 'EOF' > deb_pkg/usr/share/applications/excel_comparer.desktop
        [Desktop Entry]
        Name=Excel Comparer
        Exec=excel_comparer
        Icon=excel_comparer
        Type=Application
        Categories=Office;
        Terminal=false
        EOF

        # 7. إنشاء ملف وصف الحزمة (control)
        cat << 'EOF' > deb_pkg/DEBIAN/control
        Package: excel-comparer
        Version: 1.0.0
        Architecture: amd64
        Maintainer: Mohamed <mohamedfarhan2113@gmail.com>
        Description: excel comparer app
        EOF

        # 8. تجميع ملف .deb
        dpkg-deb --build deb_pkg excel_comparer_1.0.0_amd64.deb

    - name: Upload Linux Build
      if: matrix.target == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: Linux-DEB
        path: excel_comparer_1.0.0_amd64.deb